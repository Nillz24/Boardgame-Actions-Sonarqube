

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Trivy scan on the repository
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs' # Scans the filesystem of the checked-out repository
        format: 'table'
        exit-code: '0' # Fails the job if vulnerabilities are found
        severity: 'CRITICAL,HIGH'

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.scanner.socketTimeout=6000
          -X        

   # - name: SonarQube Quality Gate check
   #   id: sonarqube-quality-gate-check
   #   uses: sonarsource/sonarqube-quality-gate-action@master
      # Force to fail step after specific time.
   #   timeout-minutes: 35
   #  with:
   #    pollingTimeoutSec: 800       
    #  env:
    #    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #    SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
   

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t ${{env.DOCKERHUB_USERNAME}}/boardgame:latest .
        docker tag ${{env.DOCKERHUB_USERNAME}}/boardgame:latest ${{env.DOCKERHUB_USERNAME}}/boardgame:${{ github.sha }}
      # The image is built and tagged locally in this step, not pushed yet.


    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/boardgame:latest'
        format: 'table'
        exit-code: '0' # Fails the step if vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        output: 'trivy-results.table'

   #docker login
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker image to Docker Hub
      # This step only runs if the previous 'Run Trivy vulnerability scan' step succeeds (i.e., exit-code 0).
      run: |
        docker push ${{ env.DOCKERHUB_USERNAME }}/boardgame:latest
        docker push ${{ env.DOCKERHUB_USERNAME }}/boardgame:${{ github.sha }}

    - name: Upload Trivy scan results to GitHub summary
      if: always()
      run: |
        if [[ -s trivy-results.table ]]; then
          echo "### Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Click to expand</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat trivy-results.table >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi          




